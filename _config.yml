title: "Parallel Path"
tagline: "A Governed State Control Plane"
description: "Orchestrate complex async workflows across parallel layers with guarded autonomy. Every action becomes a versioned, auditable state transition."
url: "https://dcpanda.github.io/parallel-path-site"
baseurl: ""
repository: dcpanda/parallel-path
author: dcpanda
show_downloads: false
markdown: kramdown
kramdown:
  input: GFM
plugins:
  - jekyll-seo-tag
  - jekyll-sitemap
exclude:
  - Gemfile
  - Gemfile.lock
  - .ruby-version
  - README.md
  - _site
  - .jekyll-cache
defaults:
  - scope:
      path: "features"
    values:
      layout: default
      markdown: kramdown
  - scope:
      path: ""
    values:
      layout: default
